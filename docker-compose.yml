

services:
  db:
    image: mysql:8
    container_name: cna_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cna_db
      MYSQL_USER: cna_user
      MYSQL_PASSWORD: cn4pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    command: >
      sh -c "
        while ! nc -z db 3306;
        do
          echo 'Esperando a que MySQL (db:3306) esté listo...';
          sleep 2;
        done;
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DB_HOST=db
      - DJANGO_DB_NAME=cna_db
      - DJANGO_DB_USER=cna_user
      - DJANGO_DB_PASSWORD=cn4pass
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

    environment:
      - CHOKIDAR_USEPOLLING=true

    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules:
